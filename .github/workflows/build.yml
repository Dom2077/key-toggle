name: Build KeyToggle EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: dir
      - run: pip install pynput pyinstaller
      - run: pyinstaller --onefile --windowed --name KeyToggle key_toggle.py
      - uses: actions/upload-artifact@v4
        with:
          name: KeyToggle
          path: dist/KeyToggle.exe
